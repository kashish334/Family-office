# ════════════════════════════════════════════════════════════════
#  Family Office – Nginx Configuration
#  Serves React SPA + reverse-proxies API requests
#  Includes: gzip, security headers, rate limiting, caching
# ════════════════════════════════════════════════════════════════

# Worker tuning
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── MIME types ─────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75;
    types_hash_max_size 2048;
    server_tokens      off;     # hide nginx version

    # ── Gzip compression ───────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Rate limiting zones ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=10r/m;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=20r/m;

    # ── Upstream – FastAPI backend ─────────────────────────────────
    upstream api_backend {
        least_conn;
        server api:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── Security headers map ───────────────────────────────────────
    map $sent_http_content_type $x_content_type {
        default "nosniff";
    }

    # ════════════════════════════════════════════════════════════════
    #  Main server block – HTTP (redirects to HTTPS in production)
    # ════════════════════════════════════════════════════════════════
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ── Health check (for Docker HEALTHCHECK + load balancers) ──
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── Security headers ────────────────────────────────────────
        add_header X-Frame-Options           "DENY"                always;
        add_header X-Content-Type-Options    "nosniff"             always;
        add_header X-XSS-Protection          "1; mode=block"       always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Content Security Policy
        add_header Content-Security-Policy
            "default-src 'self'; \
             script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; \
             style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
             font-src 'self' https://fonts.gstatic.com; \
             img-src 'self' data: blob: https:; \
             connect-src 'self' https://api.anthropic.com; \
             frame-ancestors 'none';"
            always;

        # ── API proxy ───────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout    10s;
            proxy_send_timeout       60s;
            proxy_read_timeout       60s;
            proxy_buffer_size        4k;
            proxy_buffers            8 4k;

            # CORS handled by FastAPI; strip any duplicates from nginx
            proxy_hide_header Access-Control-Allow-Origin;
        }

        # ── Auth endpoints – stricter rate limit ────────────────────
        location /api/v1/auth/login {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/auth/register {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── File uploads – size limit ───────────────────────────────
        location /api/v1/families/uploads/ {
            limit_req zone=upload_limit burst=5;
            client_max_body_size 15M;

            proxy_pass         http://api_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── Static assets – aggressive caching ─────────────────────
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
            access_log off;
        }

        # ── Fonts ───────────────────────────────────────────────────
        location ~* \.(woff|woff2|ttf|otf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
            access_log off;
        }

        # ── React SPA – serve index.html for all non-file routes ────
        location / {
            try_files $uri $uri/ /index.html;

            # HTML: no cache (always fresh)
            location ~* \.html$ {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma        "no-cache";
                expires 0;
            }
        }

        # ── Block common attack vectors ─────────────────────────────
        location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl)$ {
            return 403;
        }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── 404 → SPA fallback ──────────────────────────────────────
        error_page 404 /index.html;

        # ── Custom error pages ──────────────────────────────────────
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # ════════════════════════════════════════════════════════════════
    #  HTTPS server block (uncomment in production with SSL certs)
    # ════════════════════════════════════════════════════════════════
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/ssl/certs/fullchain.pem;
    #     ssl_certificate_key /etc/ssl/private/privkey.pem;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers on;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #
    #     # ... same location blocks as above ...
    # }
}
