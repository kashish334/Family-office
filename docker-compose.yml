x-app-env: &app-env
  ENVIRONMENT:              ${ENVIRONMENT:-development}
  DEBUG:                    ${DEBUG:-true}
  SECRET_KEY:               ${SECRET_KEY:-dev-secret-key-change-in-production}
  JWT_SECRET_KEY:           ${JWT_SECRET_KEY:-dev-jwt-key-change-in-production}
  DATABASE_URL:             postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-family_office}
  DATABASE_URL_SYNC:        postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-family_office}
  REDIS_URL:                redis://redis:6379/0
  CELERY_BROKER_URL:        redis://redis:6379/1
  CELERY_RESULT_BACKEND:    redis://redis:6379/2
  OPENAI_API_KEY:           ${OPENAI_API_KEY:-}
  OPENAI_MODEL:             ${OPENAI_MODEL:-gpt-4o-mini}
  ALLOWED_ORIGINS:          ${ALLOWED_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:5173}
  STORAGE_BACKEND:          ${STORAGE_BACKEND:-local}
  LOG_LEVEL:                ${LOG_LEVEL:-info}

x-healthcheck-defaults: &healthcheck-defaults
  interval:     15s
  timeout:      10s
  retries:      5
  start_period: 30s

volumes:
  postgres_data:
  redis_data:
  uploads:
  logs:
  pgadmin_data:

networks:
  app_net:
    driver: bridge

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: family_office_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-family_office}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-family_office}"]

  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: family_office_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - app_net
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]

  # ── FastAPI Backend ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: runtime
    container_name: family_office_api
    restart: unless-stopped
    environment:
      <<: *app-env
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - logs:/app/logs
    networks:
      - app_net
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app
             --host 0.0.0.0
             --port 8000
             --reload
             --log-level ${LOG_LEVEL:-info}"

  # ── Celery Worker ─────────────────────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: runtime
    container_name: family_office_celery_worker
    restart: unless-stopped
    environment:
      <<: *app-env
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    networks:
      - app_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.tasks.celery_worker worker
      --loglevel=${LOG_LEVEL:-info}
      --concurrency=2

  # ── Celery Beat ───────────────────────────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: runtime
    container_name: family_office_celery_beat
    restart: unless-stopped
    environment:
      <<: *app-env
    volumes:
      - ./backend:/app
      - logs:/app/logs
    networks:
      - app_net
    depends_on:
      - celery-worker
    command: >
      celery -A app.tasks.celery_worker beat
      --loglevel=${LOG_LEVEL:-info}

  # ── React Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: runtime
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
        VITE_APP_NAME: "Family Office"
    container_name: family_office_frontend
    restart: unless-stopped
    networks:
      - app_net
    depends_on:
      api:
        condition: service_healthy

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: family_office_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - logs:/var/log/nginx
    networks:
      - app_net
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - frontend
      - api